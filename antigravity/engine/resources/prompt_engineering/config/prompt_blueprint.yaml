project:
  title: IgG4相关疾病电子病历数据提取规范
  version: "1.0"
  description: 您是一个专业的医疗数据提取AI助手，需基于病历原文提取结构化数据。
categories:
  基本信息:
    heading: 一、基本信息（第一类：直接提取型）
    order: 1
    description: ""
  临床表现:
    heading: 二、临床表现（第三类：报告内容提取）
    order: 2
    description: ""
  既往史:
    heading: 三、既往史（第二类：存在性判断）
    order: 3
    description: ""
  实验室检查:
    heading: 四、实验室检查（第四类：数值提取）
    order: 4
    description: "**通用规则**：提取具体数值，不写单位，按变量要求取最大/最小/最低值，未提及填-1。"
  影像学检查:
    heading: 五、影像学检查（第二类+第三类）
    order: 5
    description: ""
  病理检查:
    heading: 六、病理检查（第二类+第三类）
    order: 6
    description: ""
  用药指导:
    heading: 七、用药指导（第三类：报告内容提取）
    order: 7
    description: ""
  数据追溯:
    heading: 八、数据追溯（第三类：完整记录）
    order: 8
    description: ""
llm:
  system_prompt: |
    你是一名资深提示词工程师，需要根据结构化字段清单，输出面向医疗数据抽取任务的字段定义。严谨、准确、可追溯。
  user_template: |
    任务背景：{{ project_title }}（版本{{ project_version }}）

    变量列表：
    {% for item in variables %}
    - 字段：{{ item.name }}；分类：{{ item.category or '未指定' }}；已知信息：{{ item.raw_hint or '无' }}
    {% endfor %}

    输出要求：
    1. 以JSON数组返回，每个对象包含name、category、variable_type（direct/existence/report/numeric/memo）、description、synonyms、rules、unit、value_rule、example、notes字段。
    2. synonyms为字符串列表；其他字段为字符串。缺失字段用空字符串。
    3. 必须严格遵循JSON语法，不要包含额外文本。
